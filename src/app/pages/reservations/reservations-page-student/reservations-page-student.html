<bp-smart-grid-modernized
    [columns]="columnsDef()"
    [(tableState)]="tableState"
    [storageName]="'reservations-student'"

    [lineItemComponent]="renderComponent"
    [totalRecords]="totalRecords()"
    [styleClass]="' border border-gray-300 rounded-lg shadow-sm  dark:border-gray-700'"
    [height]="'850px'"
    placeholder="Titre ou description"
></bp-smart-grid-modernized>
