<p-card class="w-[300px] h-[450px] max-h-[450px] flex flex-col justify-between shadow-md">
    <ng-template pTemplate="header">
        <div class="w-full flex justify-center p-1 pt-2">{{ teacher().firstName }} {{ teacher().lastName }}</div>
        <div class="w-full flex justify-center p-1 pt-2">{{ teacher().title }}</div>
    </ng-template>

    <ng-template pTemplate="content">
        <div class="flex flex-col gap-2 justify-between">
            <div>
                <p-image [src]="teacher().imgUrl ?? 'assets/user.svg'" alt="{{ teacher().firstName }} {{ teacher().lastName }}" [imageClass]="'w-full h-auto rounded-xl object-cover shadow-sm'" preview="true"></p-image>
                <div class="flex flex-wrap gap-1">
                    @for(language of teacher().languages; track language.name){
                    <p-tag [value]="language.name ?? ''" [style]="{ 'background-color': language.color, 'color': '#fff' }" tagClass="text-xs"> </p-tag>
                    }
                </div>
                <div class="flex flex-wrap gap-1 mt-2">
                    @for(cursus of cursuses(); track cursus.name){
                    <p-tag [value]="cursus.name" tagClass="text-xs" [style]="{ 'background-color': cursus.color, 'color': '#fff' }"> </p-tag>
                    }
                </div>
            </div>

            <div class="flex flex-wrap gap-1 mt-2 justify-center">
                <p-button label="Voir profil" [icon]="'pi pi-info'" severity="info"></p-button>
                <p-button label="Réserver" [icon]="'pi pi-calendar'"></p-button>
            </div>
        </div>
    </ng-template>
</p-card>
