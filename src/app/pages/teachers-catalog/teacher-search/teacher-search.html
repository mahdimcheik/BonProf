<div class="flex flex-col lg:flex-row gap-4">
    <!-- Search Panel -->
    <div class="search-control w-full lg:w-[400px]">
        <p-card>
            <ng-template pTemplate="header">
                <div class="p-3">
                    <h3 class="text-xl font-semibold m-0">Rechercher un professeur</h3>
                </div>
            </ng-template>
            <ng-template pTemplate="content">
                <div class="flex flex-col gap-4">
                    <!-- Full Name -->
                    <div class="flex flex-col gap-2">
                        <label for="fullName" class="font-medium text-sm">Nom complet</label>
                        <input pInputText id="fullName" [(ngModel)]="fullName" placeholder="Rechercher par nom..." class="w-full" />
                    </div>

                    <!-- City -->
                    <div class="flex flex-col gap-2">
                        <label for="city" class="font-medium text-sm">Ville</label>
                        <input pInputText id="city" [(ngModel)]="city" placeholder="Ville..." class="w-full" />
                    </div>

                    <!-- Postal Code -->
                    <div class="flex flex-col gap-2">
                        <label for="postalCode" class="font-medium text-sm">Code postal</label>
                        <input pInputText id="postalCode" [(ngModel)]="postalCode" placeholder="Code postal..." class="w-full" />
                    </div>

                    <!-- Date From -->
                    <div class="flex flex-col gap-2">
                        <label for="dateFrom" class="font-medium text-sm">Disponible à partir du</label>
                        <p-datePicker
                            [(ngModel)]="dateFrom"
                            [showIcon]="true"
                            dateFormat="dd/mm/yy"
                            placeholder="Date de début"
                            class="w-full configurable-form-input configurable-form-date-input"
                            appendTo="body"
                            [panelStyle]="{ 'z-index': '998' }"
                        />
                    </div>

                    <!-- Date To -->
                    <div class="flex flex-col gap-2">
                        <label for="dateTo" class="font-medium text-sm">Disponible jusqu'au</label>
                        <p-datePicker [(ngModel)]="dateTo" [showIcon]="true" dateFormat="dd/mm/yy" placeholder="Date de fin" class="w-full configurable-form-input configurable-form-date-input" appendTo="body" [panelStyle]="{ 'z-index': '998' }" />
                    </div>

                    <!-- Categories -->
                    <div class="flex flex-col gap-2">
                        <label for="categories" class="font-medium text-sm">Catégories</label>
                        <p-multiSelect [(ngModel)]="selectedCategories" [options]="categories()" optionLabel="name" optionValue="id" placeholder="Sélectionner des catégories" [showHeader]="false" class="w-full"> </p-multiSelect>
                    </div>

                    <!-- Levels -->
                    <div class="flex flex-col gap-2">
                        <label for="levels" class="font-medium text-sm">Niveaux</label>
                        <p-multiSelect [(ngModel)]="selectedLevels" [options]="levels()" optionLabel="name" optionValue="id" placeholder="Sélectionner des niveaux" [showHeader]="false" class="w-full"> </p-multiSelect>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex flex-col gap-2 mt-2">
                        <p-button label="Rechercher" icon="pi pi-search" (onClick)="onSearch()" class="w-full" />
                        <p-button label="Réinitialiser" icon="pi pi-refresh" severity="secondary" (onClick)="clearFilters()" class="w-full" />
                    </div>
                </div>
            </ng-template>
        </p-card>
    </div>

    <!-- Results Panel -->
    <div class="w-full flex flex-col gap-4">
        @if (teachers().length > 0) { @for (teacher of teachers(); track teacher.id) {
        <bp-teacher-card [teacher]="teacher"></bp-teacher-card>
        } } @else {
        <p-card>
            <ng-template pTemplate="content">
                <div class="text-center text-gray-500 p-4">
                    <i class="pi pi-search text-4xl mb-3"></i>
                    <p>Aucun professeur trouvé. Essayez de modifier vos critères de recherche.</p>
                </div>
            </ng-template>
        </p-card>
        }
    </div>
</div>
