<app-smart-section [title]="relatedType()?.displayName ?? 'Documents'" [editMode]="true" buttonIcon="pi pi-plus" (onAddClick)="onAddDocument()">
    <ng-template #main>
        @for (document of relatedDocuments(); track $index) {
        <p>{{ document.title }} / {{ document.fileName }} / {{ document.size }} bytes</p>
        }
    </ng-template>
</app-smart-section>

@if(modalVisible()) {
<bp-modal-add-edit-document [type]="privacyDocumentTypeEnum.Diploma" [(visible)]="modalVisible" (cancelClicked)="modalVisible.set(false)" (submitClicked)="needRefresh.emit()"></bp-modal-add-edit-document>
}
